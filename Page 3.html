<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="Pags 1 (CSS).css">

<body>

    <nav>
        <div class="logo">SEAN ENZO</div>
        <ul>
            <li><a href="My E-portfolio.html">Portfolio</a></li>
            <li><a href="#stats">Stats</a></li>
            <li><a href="Contact page.html">Contact</a></li>
        </ul>

    <main id="gallery">
        <section class="viewport-gallery">
            
            <div class="collage-side">
                <div class="collage-grid">
                    <div class="small-photo">
                        <img src="0d438aad-02a9-4f66-ab73-dae383dad3f8.jpg" onmouseover="changeImage(this.src)" alt="Port 1">
                    </div>
                    <div class="small-photo">
                        <img src="cfefd7f5-e0b7-407a-afcf-f225c0a90bbd.jpg" onmouseover="changeImage(this.src)" alt="Port 2">
                    </div>
                    <div class="small-photo">
                        <img src="c3154d1b-6104-4b30-834e-4d48c7dbcd6a.jpg" onmouseover="changeImage(this.src)" alt="Port 3">
                    </div>
                    <div class="small-photo">
                        <img src="e048bb06-a24c-43aa-a073-c0d21c9093f1.jpg" onmouseover="changeImage(this.src)" alt="Port 4">
                    </div>
                    <div class="small-photo">
                        <img src="fc9c68e5-1c4a-4cb9-a04f-9e7eb23177da.jpg" onmouseover="changeImage(this.src)" alt="Port 4">
                    </div>
                    <div class="small-photo">
                        <img src="47acc271-51d7-4de7-bc24-24a14ff38786.jpg" onmouseover="changeImage(this.src)" alt="Port 4">
                    </div>
                </div>
                <div class="collage-text">
                    <h2>Portfolio</h2>
                    <p>Hover to Preview</p>
                </div>
            </div>

            <div class="main-side">
                <img id="mainHero" src="0d438aad-02a9-4f66-ab73-dae383dad3f8.jpg" alt="Main Feature">
            </div>

        </section>
    </main>

    <section id="stats">
        <h2>Measurements</h2>
        <table>
            <tr><td>Height</td><td>183 cm</td></tr>
            <tr><td>Waist</td><td>33"</td></tr>
            <tr><td>Shoe</td><td>10.5</td></tr>
            <tr><td>Tops</td><td>Large</td></tr>
            <tr><td>Bottoms</td><td>Medium</td></tr>
            <tr><td>Hair</td><td>Black</td></tr>
            <tr><td>Eyes</td><td>Brown</td></tr>

    </section>

    <section id="contact">
        <h2>Bookings</h2>
        <a href="mailto:seanenzotorrano@gmail.com">seanenzotorrano@gmail.com</a>
    </section>

    <footer>
        <p>© 2026 Sean Enzo B. Torrano. All rights reserved.</p>
    </footer>

    <script>
        function changeImage(newSrc) {
            const mainImg = document.getElementById('mainHero');
            mainImg.style.opacity = '0.3';
            setTimeout(() => {
                mainImg.src = newSrc;
                mainImg.style.opacity = '1';
            }, 100);
        }
    </script>

</body>
</html>
